{% extends "base.html" %}

{% block title %}{{ section.title }} — {{ config.title }}{% endblock %}

{% block content %}
<h1>{{ section.title }}</h1>
<ul>
  {% for post in section.pages %}
  <li>{{ post.date }} — <a href="{{ post.permalink }}">{{ post.title }}</a></li>
  {% endfor %}
</ul>
{% endblock %}
